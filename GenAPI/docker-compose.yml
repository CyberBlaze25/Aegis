services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=genapi_db

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build: .
    ports: 
      - "8080:8080"
    environment:
      - DB_URL=postgres://user:password@db:5432/genapi_db?sslmode=disable
    depends_on:
      - db
      - qdrant

volumes:
  postgres_data:
  qdrant_data:
